# ---------------------------------------------------------------------------
# TEST profile -> H2 in-memory database (PostgreSQL compatibility mode).
# Schema is created from the JPA entities on startup and dropped on shutdown.
# ---------------------------------------------------------------------------
spring:
  datasource:
    url: jdbc:h2:mem:artgallery_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

logging:
  level:
    com.artgallery: INFO
