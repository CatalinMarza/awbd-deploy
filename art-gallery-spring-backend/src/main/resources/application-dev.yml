# ---------------------------------------------------------------------------
# DEV profile -> PostgreSQL.
# Sensitive values (URL / user / password) are provided via environment
# variables, with local-development defaults as a fallback.
# ---------------------------------------------------------------------------
spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/artgallery}
    username: ${POSTGRES_USER:artgallery}
    password: ${POSTGRES_PASSWORD:artgallery}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.artgallery: DEBUG
    org.hibernate.SQL: DEBUG
