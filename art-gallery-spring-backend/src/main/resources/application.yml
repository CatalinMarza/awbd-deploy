# ---------------------------------------------------------------------------
# Base configuration shared by all profiles.
# Profile-specific data sources live in application-dev.yml / application-test.yml.
# The active profile defaults to "dev" but can be overridden with
# the SPRING_PROFILES_ACTIVE environment variable.
# ---------------------------------------------------------------------------
spring:
  application:
    name: art-gallery-spring-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax

# CORS origin for the Vue.js SPA (overridable via env var).
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
