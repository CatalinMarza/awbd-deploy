services:
  postgres:
    image: postgres:16-alpine
    container_name: artgallery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: artgallery
      POSTGRES_USER: artgallery
      POSTGRES_PASSWORD: artgallery
    ports:
      - "5432:5432"
    volumes:
      - artgallery-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artgallery -d artgallery"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  artgallery-pgdata:
